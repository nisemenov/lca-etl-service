stages:
  - test
  - deploy

test:
  stage: test
  image: golang:1.26.2-alpine3.23
  variables:
    GOMODCACHE: "$CI_PROJECT_DIR/.cache/go-mod"
    GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"
    CGO_ENABLED: 1
  cache:
    paths:
      - .cache/go-mod
      - .cache/go-build
  before_script:
    - apk add --no-cache gcc musl-dev
  script:
    - go mod download
    - go test -v ./...
  tags:
    - etl-service

deploy:
  stage: deploy
  image: docker:29.4-cli
  before_script:
    # из-за TLS: unspecified error при fetching APKINDEX
    - echo "https://mirrors.aliyun.com/alpine/v3.23/main" > /etc/apk/repositories
    - echo "https://mirrors.aliyun.com/alpine/v3.23/community" >> /etc/apk/repositories
    - apk add --no-cache docker-cli-compose
  script:
    - docker compose -f docker-compose.yml down --remove-orphans
    - docker compose -f docker-compose.yml up -d --build
  tags:
    - etl-service
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
